<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilar 1 | Terminal de Acceso Directo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. VARIABLES Y CONFIGURACIÓN GLOBAL
           ========================================= */
        :root {
            --gold: #e5c096;
            --dark-bg: #050505;
            --glass-bg: rgba(20, 20, 20, 0.5);
            --glass-border: rgba(229, 192, 150, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --success: #00e676;
            --transition: all 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            /* Animación de entrada suave */
            animation: fadeIn 0.8s ease-out forwards;
            background-image: radial-gradient(circle at 50% 0%, rgba(229, 192, 150, 0.05), transparent 60%);
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           2. DISEÑO DEL CONTENEDOR PRINCIPAL
           ========================================= */
        .terminal-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        .volver-btn {
            position: absolute;
            top: -50px;
            left: 0;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: var(--transition);
        }
        .volver-btn:hover { color: white; }

        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }

        /* =========================================
           3. SISTEMA DE PESTAÑAS (CHECK-IN / CHECK-OUT)
           ========================================= */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            padding: 10px 20px;
            transition: var(--transition);
            position: relative;
        }

        /* Estilo para la pestaña que está seleccionada actualmente */
        .tab-btn.active {
            color: var(--gold);
            font-weight: 600;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -21px; /* Alineado con el borde inferior del contenedor tabs */
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }

        /* Ocultar secciones por defecto */
        .form-section { display: none; animation: fadeIn 0.5s ease-out; }
        /* Mostrar la sección activa */
        .form-section.active { display: block; }

        /* =========================================
           4. DISEÑO DE FORMULARIOS (INPUTS Y BOTONES)
           ========================================= */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group { margin-bottom: 20px; }
        .input-group.full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 8px; }
        
        input, select {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: var(--transition);
        }
        
        input:focus, select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(229, 192, 150, 0.15);
        }

        /* Invertir el color del icono del calendario para que se vea en fondo oscuro */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .btn-submit {
            grid-column: span 2;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 18px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 10px 20px rgba(229, 192, 150, 0.3);
        }

    </style>
</head>
<body>

    <div class="terminal-container">
        <!-- Enlace para regresar a la presentación principal -->
        <a href="index.html" class="volver-btn">← Volver a la presentación</a>

        <h1>Soberanía Operativa</h1>
        <p class="subtitle">Terminal de Gestión de Huéspedes B2B</p>

        <!-- Pestañas de Navegación -->
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarPestana('checkin')">Check-in</button>
            <button class="tab-btn" onclick="cambiarPestana('checkout')">Check-out</button>
        </div>

        <!-- SECCIÓN 1: FORMULARIO DE CHECK-IN -->
        <div id="checkin" class="form-section active">
            <form id="formCheckIn">
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Nombre Completo del Huésped</label>
                        <input type="text" placeholder="Ej. Alexander Hamilton" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Documento de Identidad (ID)</label>
                        <input type="text" placeholder="Número de pasaporte o CC" required>
                    </div>

                    <div class="input-group">
                        <label>Correo Electrónico Directo</label>
                        <input type="email" placeholder="contacto@cliente.com" required>
                    </div>

                    <div class="input-group">
                        <label>Fecha de Llegada</label>
                        <input type="date" required>
                    </div>

                    <div class="input-group">
                        <label>Fecha de Salida</label>
                        <input type="date" required>
                    </div>

                    <div class="input-group full-width">
                        <label>Selección de Suite / Habitación</label>
                        <select required>
                            <option value="" disabled selected>Seleccione el nivel de suite</option>
                            <option value="presidencial">Suite Presidencial (Vista al Mar)</option>
                            <option value="premium">Suite Premium King</option>
                            <option value="standard">Habitación Doble Deluxe</option>
                        </select>
                    </div>

                    <button type="button" class="btn-submit" onclick="alert('Datos guardados en la base de datos propia. Recaudo directo iniciado.')">
                        Registrar y Procesar Recaudo Neto
                    </button>
                </div>
            </form>
        </div>

        <!-- SECCIÓN 2: FORMULARIO DE CHECK-OUT -->
        <div id="checkout" class="form-section">
            <form id="formCheckOut">
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Número de Habitación a Liberar</label>
                        <input type="number" placeholder="Ej. 402" required>
                    </div>

                    <div class="input-group full-width">
                        <label>Cargos Adicionales (Minibar, Spa, Restaurante)</label>
                        <input type="number" placeholder="Monto total en COP" required>
                    </div>

                    <button type="button" class="btn-submit" onclick="alert('Check-out completado. Habitación liberada en el sistema y cargos adicionales procesados.')" style="border-color: var(--success); color: var(--success);">
                        Finalizar Estadía y Facturar
                    </button>
                </div>
            </form>
        </div>

    </div>

    <!-- =========================================
         5. LÓGICA JAVASCRIPT (INTERACTIVIDAD)
         ========================================= -->
    <script>
        /**
         * Función para cambiar entre las vistas de Check-in y Check-out.
         * @param {string} pestanaId - El ID de la sección que queremos mostrar ('checkin' o 'checkout').
         */
        function cambiarPestana(pestanaId) {
            // 1. Quitar la clase 'active' de todas las secciones de formulario para ocultarlas
            const secciones = document.querySelectorAll('.form-section');
            secciones.forEach(seccion => seccion.classList.remove('active'));

            // 2. Quitar la clase 'active' de todos los botones de las pestañas
            const botones = document.querySelectorAll('.tab-btn');
            botones.forEach(boton => boton.classList.remove('active'));

            // 3. Añadir la clase 'active' solo a la sección que el usuario solicitó mostrar
            document.getElementById(pestanaId).classList.add('active');

            // 4. Identificar qué botón se hizo clic (buscando el texto o el atributo onclick) y ponerlo activo
            // Usamos un pequeño truco buscando el botón que llama a esta función con ese ID específico
            const botonActivo = Array.from(botones).find(boton => boton.getAttribute('onclick').includes(pestanaId));
            if (botonActivo) {
                botonActivo.classList.add('active');
            }
        }
    </script>
</body>
</html>
